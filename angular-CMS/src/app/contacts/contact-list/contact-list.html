<div class="panel panel-default">
  <div class="panel-heading">
    <div class="row" style="padding: 10px; display: flex; align-items: center;">
      <span class="title" style="font-size: 24px; font-weight: bold; margin-left: 10px;">Contacts</span>
      <div style="flex-grow: 1;"></div>
      <a [routerLink]="['new']" class="btn btn-success" style="margin-right: 10px;">Add Contact</a>
    </div>
    <div class="clearfix"></div>
  </div>
  <div class="panel-body">
    <div class="row">
      <div class="col-xs-12">
        <cms-contact-item 
          *ngFor="let contact of contacts" 
          [contact]="contact"
          [routerLink]="[contact.id]"
          routerLinkActive="active">
        </cms-contact-item>
      </div>
    </div>
  </div>
</div>
