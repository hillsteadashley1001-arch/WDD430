<div class="panel panel-default">
  <div class="panel-body">
    <form id="contact-edit" #f="ngForm" (ngSubmit)="onSubmit(f)">
      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            class="form-control required"
            size="120"
            max="120"
            [ngModel]="contact?.name"
            required
            #name="ngModel">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="email">Email:</label>
          <input
          type="text"
          id="email"
          name="email"
          class="form-control"
          [ngModel]="contact?.email"
          required
          pattern="[a-z0-9._%+\-]+@[a-z0-9.\-]+\.[a-z]{2,3}$"
          #email="ngModel">
          <div class="alert alert-danger" *ngIf="!email.valid && email.touched">Enter a valid Email address.</div>
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="phone">Phone:</label>
          <input
            type="text"
            id="phone"
            name="phone"
            class="form-control invalid"
            size="150"
            max="255"
            [ngModel]="contact?.phone"
            #phone="ngModel">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label for="imageUrl">Image URL:</label>
          <input
            type="text"
            id="imageUrl"
            name="imageUrl"
            class="form-control"
            size="150"
            max="255"
            [ngModel]="contact?.imageUrl"
            #imageUrl="ngModel">
        </div>
      </div>

      <div class="row">
        <div class="col-sm-12 form-group">
          <label>Contact Group:</label>
          <div class="alert alert-info">
            Group functionality (drag and drop) will be added in a future update.
          </div>
          <div class="row" id="groupList" style="min-height: 50px;">
            <div *ngFor="let contact of groupContacts; let i = index">
              <div class="col-sm-11">
                <cms-contact-item [contact]="contact"></cms-contact-item>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="alert alert-danger" *ngIf="!name.valid || !email.valid">
        The Name and Email are required.
      </div>

      <div class="row">
        <div class="col-xs-12 btn-toolbar">
          <button class="btn btn-success" type="submit" [disabled]="!f.valid">Save</button>
          <button class="btn btn-primary" type="button" (click)="onCancel()">Cancel</button>
        </div>
      </div>
    </form>
  </div>
</div>
